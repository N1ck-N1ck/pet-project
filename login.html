<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN-login</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <form action="/register" method="post" class="registration-form">
        <div class="icon-container">
        <img src ="image/Group 4.png" width = "30" height="55">
        </div>
<div class="input">
        <input type="email" id="email" name="email" placeholder="Логин" required>
        
        <input type="password" id="password" name="password" placeholder="Пароль" required>
        
        <input type="password" id="confirm-password" name="confirm_password" placeholder="Подтвердить пароль" required>
</div>
        <div class="btn-reg">
        <button type="submit"><b>Зарегистрироваться</b></button>
        </div>
        <a href="#" class="sign-in">уже есть аккаунт?</a>
      </form>
</body>
</html>
